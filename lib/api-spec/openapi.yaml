components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── AUTH / USERS ─────────────────────────────────────────────────────────
    AuthUserResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - authenticated

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        replitId:
          type: string
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        role:
          type: string
          enum: [BUYER, SELLER, ADMIN]
        rewardCoins:
          type: integer
        referralCode:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - replitId
        - role
        - rewardCoins
        - isActive
        - createdAt

    UserProfileUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string

    Address:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        fullName:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: ["string", "null"]
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        landmark:
          type: ["string", "null"]
        isDefault:
          type: boolean
        type:
          type: string
          enum: [HOME, WORK, OTHER]
      required:
        - id
        - userId
        - fullName
        - phone
        - addressLine1
        - city
        - state
        - pincode
        - isDefault
        - type

    AddressInput:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        landmark:
          type: string
        isDefault:
          type: boolean
        type:
          type: string
          enum: [HOME, WORK, OTHER]
      required:
        - fullName
        - phone
        - addressLine1
        - city
        - state
        - pincode
        - type

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - type
        - title
        - message
        - isRead
        - createdAt

    # ── PRODUCTS ─────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        basePrice:
          type: number
        sellingPrice:
          type: number
        discount:
          type: integer
        images:
          type: array
          items:
            type: string
        thumbnail:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        brandId:
          type: ["integer", "null"]
        brandName:
          type: ["string", "null"]
        sellerId:
          type: ["integer", "null"]
        sellerName:
          type: ["string", "null"]
        stock:
          type: integer
        averageRating:
          type: number
        totalReviews:
          type: integer
        totalSold:
          type: integer
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        isFlashSale:
          type: boolean
        flashSalePrice:
          type: ["number", "null"]
        flashSaleEnd:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - slug
        - description
        - basePrice
        - sellingPrice
        - discount
        - images
        - thumbnail
        - categoryId
        - stock
        - averageRating
        - totalReviews
        - totalSold
        - isActive
        - isFeatured
        - isFlashSale
        - tags
        - createdAt

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            richDescription:
              type: ["string", "null"]
            specifications:
              type: object
              additionalProperties:
                type: string
            variants:
              type: array
              items:
                $ref: "#/components/schemas/ProductVariant"
            sku:
              type: ["string", "null"]
            weight:
              type: ["number", "null"]
            reviewBreakdown:
              $ref: "#/components/schemas/ReviewBreakdown"

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: ["string", "null"]
        price:
          type: number
        stock:
          type: integer
        images:
          type: array
          items:
            type: string
        attributes:
          type: object
          additionalProperties:
            type: string
      required:
        - id
        - name
        - price
        - stock
        - images

    ProductInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        richDescription:
          type: string
        basePrice:
          type: number
        sellingPrice:
          type: number
        images:
          type: array
          items:
            type: string
        thumbnail:
          type: string
        categoryId:
          type: integer
        brandId:
          type: integer
        stock:
          type: integer
        sku:
          type: string
        weight:
          type: number
        tags:
          type: array
          items:
            type: string
        specifications:
          type: object
          additionalProperties:
            type: string
        isActive:
          type: boolean
        isFeatured:
          type: boolean
      required:
        - title
        - description
        - basePrice
        - sellingPrice
        - categoryId
        - stock

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - products
        - total
        - page
        - limit
        - totalPages

    # ── CATEGORIES ───────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        image:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]
        parentId:
          type: ["integer", "null"]
        children:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        isActive:
          type: boolean
        sortOrder:
          type: integer
        productCount:
          type: integer
      required:
        - id
        - name
        - slug
        - isActive
        - sortOrder
        - productCount

    CategoryInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image:
          type: string
        icon:
          type: string
        parentId:
          type: integer
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required:
        - name
        - slug

    # ── BRANDS ───────────────────────────────────────────────────────────────
    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logo:
          type: ["string", "null"]
        bannerImage:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        productCount:
          type: integer
      required:
        - id
        - name
        - slug
        - isActive
        - isFeatured
        - productCount

    BrandDetail:
      allOf:
        - $ref: "#/components/schemas/Brand"
        - type: object
          properties:
            products:
              type: array
              items:
                $ref: "#/components/schemas/Product"

    BrandInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        logo:
          type: string
        bannerImage:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        isFeatured:
          type: boolean
      required:
        - name
        - slug

    # ── CART ─────────────────────────────────────────────────────────────────
    Cart:
      type: object
      properties:
        id:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        discount:
          type: number
        couponCode:
          type: ["string", "null"]
        couponDiscount:
          type: number
        shippingCost:
          type: number
        total:
          type: number
        itemCount:
          type: integer
      required:
        - id
        - items
        - subtotal
        - discount
        - couponDiscount
        - shippingCost
        - total
        - itemCount

    CartItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        variantId:
          type: ["integer", "null"]
        quantity:
          type: integer
        priceAtAdd:
          type: number
        product:
          $ref: "#/components/schemas/Product"
        variantName:
          type: ["string", "null"]
      required:
        - id
        - productId
        - quantity
        - priceAtAdd
        - product

    CartItemInput:
      type: object
      properties:
        productId:
          type: integer
        variantId:
          type: integer
        quantity:
          type: integer
      required:
        - productId
        - quantity

    CartItemUpdate:
      type: object
      properties:
        itemId:
          type: integer
        quantity:
          type: integer
      required:
        - itemId
        - quantity

    CouponApply:
      type: object
      properties:
        code:
          type: string
        orderAmount:
          type: number
      required:
        - code

    CouponValidation:
      type: object
      properties:
        valid:
          type: boolean
        code:
          type: string
        discountType:
          type: string
        discountValue:
          type: number
        discountAmount:
          type: number
        message:
          type: string
      required:
        - valid
        - code
        - message

    # ── WISHLIST ─────────────────────────────────────────────────────────────
    WishlistItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        addedAt:
          type: string
      required:
        - id
        - productId
        - product
        - addedAt

    WishlistInput:
      type: object
      properties:
        productId:
          type: integer
      required:
        - productId

    # ── ORDERS ───────────────────────────────────────────────────────────────
    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        userId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:
          type: number
        discount:
          type: number
        shippingCost:
          type: number
        tax:
          type: number
        total:
          type: number
        couponCode:
          type: ["string", "null"]
        couponDiscount:
          type: number
        paymentMethod:
          type: string
        paymentStatus:
          type: string
          enum: [PENDING, PAID, FAILED, REFUNDED]
        orderStatus:
          type: string
          enum: [PLACED, CONFIRMED, PACKED, SHIPPED, OUT_FOR_DELIVERY, DELIVERED, CANCELLED, RETURNED]
        trackingNumber:
          type: ["string", "null"]
        estimatedDelivery:
          type: ["string", "null"]
        rewardCoinsEarned:
          type: integer
        rewardCoinsUsed:
          type: integer
        shippingAddress:
          $ref: "#/components/schemas/Address"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - orderNumber
        - userId
        - items
        - subtotal
        - discount
        - shippingCost
        - tax
        - total
        - couponDiscount
        - paymentMethod
        - paymentStatus
        - orderStatus
        - rewardCoinsEarned
        - rewardCoinsUsed
        - createdAt
        - updatedAt

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        variantId:
          type: ["integer", "null"]
        sellerId:
          type: ["integer", "null"]
        title:
          type: string
        image:
          type: string
        price:
          type: number
        quantity:
          type: integer
        itemStatus:
          type: string
      required:
        - id
        - orderId
        - productId
        - title
        - image
        - price
        - quantity
        - itemStatus

    OrderInput:
      type: object
      properties:
        addressId:
          type: integer
        paymentMethod:
          type: string
        useRewardCoins:
          type: boolean
        notes:
          type: string
        couponCode:
          type: string
      required:
        - addressId
        - paymentMethod

    OrderStatusUpdate:
      type: object
      properties:
        status:
          type: string
        trackingNumber:
          type: string
      required:
        - status

    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - orders
        - total
        - page
        - limit
        - totalPages

    # ── REVIEWS ──────────────────────────────────────────────────────────────
    Review:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userAvatar:
          type: ["string", "null"]
        productId:
          type: integer
        rating:
          type: integer
        title:
          type: ["string", "null"]
        body:
          type: string
        images:
          type: array
          items:
            type: string
        isVerifiedPurchase:
          type: boolean
        helpfulCount:
          type: integer
        isApproved:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - userId
        - userName
        - productId
        - rating
        - body
        - images
        - isVerifiedPurchase
